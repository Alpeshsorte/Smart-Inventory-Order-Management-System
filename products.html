<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/fd77f2e235.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- <div id="topnav">
        <input type="search" id="search" placeholder="Enter the search value">
        <input type="submit" id="submit">
        <a href=""><i class="fa-regular fa-bell"></i>Notification</a>
        <a href=""><i class="fa-regular fa-user"></i>Login/Signup</a>
    </div> -->

    <div id="navbottom">
        <!-- product search by product name, brand, category  -->
        <input type="search" id="productsearch" placeholder="Enter product for search">
        <input type="submit" id="pro_serch">


        <select name="" id="Category">
            <option value="all Categories">All Categories</option>
            <option value="mobiles">Mobiles</option>
            <option value="laptop">Laptop</option>
            <option value="accessaries">Accessaries</option>
            <option value="smart_watch">Smart watch</option>
        </select>

        <select name="" id="price_range">
            <option value="price">price</option>
            <option value="₹0-₹5000">₹0-₹5000</option>
            <option value="₹5000-₹20000">₹5000-₹20000</option>
            <option value="₹20000+">₹20000+</option>
        </select>

        <select name="" id="Stock">
            <option value="select stock">select stock</option>
            <option value="in_stock">In Stock</option>
            <option value="low_stock">Low Stock</option>
            <option value="out_of_stock">Out of Stock</option>
        </select>

        <select name="" id="brand">
            <option value="select brand">select brand</option>
            <option value="samsung">Samsung</option>
            <option value="apple">Apple</option>
            <option value="hp">HP</option>
            <option value="lenovo">Lenovo</option>
        </select>

        <select name="" id="sorting">
            <option value="product_sorting">Product Sorting</option>
            <option value="Price Low to high">Price Low to high</option>
            <option value="Price high to low">Price high to low</option>
            <option value="Product Name A-Z">Product Name A-Z</option>
            <option value="Product Name Z-A">Product Name Z-A</option>
            <option value="Highest Stock First">Highest Stock First</option>
            <option value="Newly added products">Newly added products</option>
        </select>
    </div>

    <div id="form">
            
        <form id="productform">
            <!-- <h2>Add Product</h2> -->
            <input type="text" id="name" placeholder="Enter product name">
            <input type="text" id="brand" placeholder="Enter product brand">
            <input type="text" id="category" placeholder="Enter product category">
            <input type="number" id="price" placeholder="Enter product price">
            <input type="number" id="quantity" placeholder="Enter product quantity">
            <input type="text" id="image" placeholder="Enter product image URL">
            <textarea id="description" placeholder="Enter product description"></textarea>
            <select id="status">
                <option disabled value="Availability">Availability Status</option>
                <option value="In_stock">In Stock</option>
                <option value="Out_of_stock">Out Of Stock</option>
            </select>
            <button type="submit">Add Product</button>
        </form>

        <!-- <div id="update_id">
            <input type="text" id="user_id" placeholder="Enter the the id for update">
            <button onclick="getuserdata()">click to get data</button>
        </div> -->

            <form id="productupdate">

                <!-- <input type="text" id="product_id" placeholder="Enter the the id for update">
                <button onclick="getproductdata()">click to get product data</button> -->

                <input type="text" id="product_id" placeholder="Enter product id">

                <input type="text" id="update_name" placeholder="Enter name">

                <input type="text" id="update_brand" placeholder="Enter brand">

                <input type="text" id="update_category" placeholder="Enter category">

                <input type="number" id="update_price" placeholder="Enter price">

                <input type="number" id="update_quantity" placeholder="Enter quantity">

                <input type="text" id="update_image" placeholder="Enter image URL">

                <textarea id="update_description" placeholder="Enter description"></textarea>

                <select id="update_status">

                    <option value="In_stock">In Stock</option>

                    <option value="Out_of_stock">Out Of Stock</option>

                </select>

                <button type="submit">Update Product</button>

            </form>

    </div>
    
    <!-- CARD CONTAINER -->
    <div id="productContainer"></div>

    <!-- pagination  -->
    <div id="pagination">

        <button id="prevBtn">Previous</button>

        <div id="pageNumbers">
            <button>1</button></div>
         <div id="pageNumbers">
            <button>2</button></div>
          <div id="pageNumbers">
            <button>3</button></div>

        <button id="nextBtn">Next</button>

    </div>

    


</table>
</body>
<script src="./products.js"></script>
</html>
