<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytics</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <div id="topnav">
        <input type="search" id="search" placeholder="Enter the search value">
        <input type="submit" id="submit">
        <a href=""><i class="fa-regular fa-bell"></i>Notification</a>
        <a href=""><i class="fa-regular fa-user"></i>Login/Signup</a>
    </div>

      <div id="navleft">
        <div id="icon">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRkCJb36MKbYahBlA-qtjdO6O_ZYHP8ZcDmYw&s" alt="">

        </div>
        <div id="categary">
            <a href="">dashboard</a>
            <a href="http://127.0.0.1:5501/products.html">products</a>
            <a href="http://127.0.0.1:5501/orders/orders.html">orders</a>
            <a href="">Add products</a>
            <a href="">Add Orders</a>
            <a href="">Setting</a>
            <a href="">analytis</a>
            <br>
            <a href="">Logout</a>

        </div>

    </div>

    <!-- DASHBOARD TITLE -->

    <h1>Admin Dashboard</h1>


    <!-- DASHBOARD CONTAINER -->

    <div id="dashboardContainer">

        <!-- TOTAL PRODUCTS -->

        <div class="card">

            <i class="fa-solid fa-box"></i>

            <h2>Total Products</h2>

            <h1 id="totalProducts">0</h1>

        </div>


        <!-- TOTAL ORDERS -->

        <div class="card">

            <i class="fa-solid fa-cart-shopping"></i>

            <h2>Total Orders</h2>

            <h1 id="totalOrders">0</h1>

        </div>


        <!-- TOTAL REVENUE -->

        <div class="card">

            <i class="fa-solid fa-indian-rupee-sign"></i>

            <h2>Total Revenue</h2>

            <h1 id="totalRevenue">₹0</h1>

        </div>


        <!-- AVAILABLE STOCK -->

        <div class="card">

            <i class="fa-solid fa-warehouse"></i>

            <h2>Available Stock</h2>

            <h1 id="availableStock">0</h1>

        </div>


        <!-- OUT OF STOCK -->

        <div class="card">

            <i class="fa-solid fa-circle-xmark"></i>

            <h2>Out Of Stock</h2>

            <h1 id="outOfStock">0</h1>

        </div>


        <!-- PENDING DELIVERIES -->

        <div class="card">

            <i class="fa-solid fa-truck"></i>

            <h2>Pending Deliveries</h2>

            <h1 id="pendingDeliveries">0</h1>

        </div>


        <!-- CANCELLED ORDERS -->

        <div class="card">

            <i class="fa-solid fa-ban"></i>

            <h2>Cancelled Orders</h2>

            <h1 id="cancelledOrders">0</h1>

        </div>

    </div>

</body>
<script src="./dashboard.js"></script>
</html>
